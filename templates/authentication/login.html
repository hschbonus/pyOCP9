<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — LITRevu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } }
        }
    </script>
</head>
<body class="min-h-screen flex justify-center px-4 pt-32" style="background-color: #f0ede8; font-family: 'Inter', sans-serif;">

    <div class="w-full max-w-2xl bg-white shadow-lg rounded-sm overflow-hidden border border-gray-900 self-start">

        <!-- Header de la card -->
        <div class="border-b border-gray-200">
            <a href="/"><img src="/static/banner.png" alt="LITRevu" class="w-full object-cover"></a>
        </div>

        <!-- Corps deux colonnes -->
        <div class="flex">

            <!-- Colonne gauche — Inscription -->
            <div class="w-1/2 border-r border-gray-200 px-10 py-12 flex flex-col items-start">
                <p class="text-xs tracking-widest text-gray-400 uppercase mb-5">Nouveau ici ?</p>
                <h2 class="text-xl font-semibold text-gray-900 mb-8">Inscrivez-vous</h2>
                <a href="{% url 'signup' %}"
                   class="border border-gray-900 text-gray-900 text-sm px-5 py-2 hover:bg-gray-900 hover:text-white transition-colors">
                    S'inscrire
                </a>
            </div>

            <!-- Colonne droite — Connexion -->
            <div class="w-1/2 px-10 py-12 flex flex-col">
                <p class="text-xs tracking-widest text-gray-400 uppercase mb-5">Déjà membre ?</p>
                <h2 class="text-xl font-semibold text-gray-900 mb-8">Connectez-vous</h2>

                {% if form.errors %}
                <p class="text-xs text-red-600 border border-red-200 bg-red-50 px-3 py-2 mb-6 rounded-sm">
                    Nom d'utilisateur ou mot de passe incorrect.
                </p>
                {% endif %}

                <form method="post" action="">
                    {% csrf_token %}

                    <div class="mb-4">
                        <label for="id_username" class="block text-xs tracking-widest text-gray-400 uppercase mb-2">
                            {{ form.username.label }}
                        </label>
                        <input type="text" name="username" id="id_username" maxlength="63" required
                            class="w-full bg-transparent border border-gray-200 px-3 py-2 text-sm text-gray-900
                                   focus:outline-none focus:border-gray-900 transition-colors rounded-sm">
                    </div>

                    <div class="mb-8">
                        <label for="id_password" class="block text-xs tracking-widest text-gray-400 uppercase mb-2">
                            {{ form.password.label }}
                        </label>
                        <input type="password" name="password" id="id_password" maxlength="63" required
                            class="w-full bg-transparent border border-gray-200 px-3 py-2 text-sm text-gray-900
                                   focus:outline-none focus:border-gray-900 transition-colors rounded-sm">
                    </div>

                    <div class="flex justify-end">
                        <button type="submit"
                            class="border border-gray-900 text-gray-900 text-sm px-5 py-2 hover:bg-gray-900 hover:text-white transition-colors">
                            Se connecter
                        </button>
                    </div>
                </form>
            </div>

        </div>
    </div>

</body>
</html>
