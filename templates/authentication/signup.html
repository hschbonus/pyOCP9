<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription — LITRevu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } }
        }
    </script>
</head>
<body class="min-h-screen" style="background-color: #f0ede8; font-family: 'Inter', sans-serif;">
<main class="min-h-screen flex justify-center px-4 pt-32">
    <div class="w-full max-w-2xl bg-white shadow-lg rounded-sm overflow-hidden border border-gray-900 self-start">

        <!-- Header de la card -->
        <div class="border-b border-gray-200">
            <a href="/"><img src="/static/banner.png" alt="LITRevu" class="w-full object-cover"></a>
        </div>

        <!-- Formulaire -->
        <div class="px-10 py-12">
            <p class="text-xs tracking-widest text-gray-600 uppercase mb-5">Nouveau ici ?</p>
            <h1 class="text-xl font-semibold text-gray-900 mb-8">Inscrivez-vous</h1>

            {% if form.errors %}
            <p class="text-xs text-red-600 border border-red-200 bg-red-50 px-3 py-2 mb-6 rounded-sm" role="alert">
                Veuillez corriger les erreurs ci-dessous.
            </p>
            {% endif %}

            <form method="post" action="">
                {% csrf_token %}

                {% for field in form %}
                <div class="mb-4">
                    <label for="{{ field.id_for_label }}" class="block text-xs tracking-widest text-gray-600 uppercase mb-2">
                        {{ field.label }}
                    </label>
                    <input type="{{ field.field.widget.input_type }}"
                           name="{{ field.html_name }}"
                           id="{{ field.id_for_label }}"
                           {% if field.value %}value="{{ field.value }}"{% endif %}
                           class="w-full bg-transparent border border-gray-200 px-3 py-2 text-sm text-gray-900
                                  focus:outline-none focus:border-gray-900 transition-colors rounded-sm">
                    {% if field.errors %}
                    <p class="text-xs text-red-600 mt-1">{{ field.errors|join:", " }}</p>
                    {% endif %}
                </div>
                {% endfor %}

                <div class="flex items-center justify-between mt-8">
                    <a href="{% url 'login' %}" class="text-xs text-gray-600 hover:text-gray-900 transition-colors">
                        Déjà un compte ?
                    </a>
                    <button type="submit"
                        class="border border-gray-900 text-gray-900 text-sm px-5 py-2 hover:bg-gray-900 hover:text-white transition-colors">
                        S'inscrire
                    </button>
                </div>
            </form>
        </div>

    </div>

</main>
</body>
</html>
